bundle:
  name: agent-forge

resources:
  experiments:
    agent_experiment:
      name: /Users/${workspace.current_user.userName}/${bundle.name}-${bundle.target}

  apps:
    agent_app:
      name: "${bundle.target}-agent"
      description: "LangGraph agent application"
      source_code_path: ./

      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "${resources.experiments.agent_experiment.id}"
            permission: 'CAN_MANAGE'
        - name: 'sql_warehouse'
          sql_warehouse:
            id: '8ba51d8cad2a3d9a'
            permission: 'CAN_USE'
        - name: 'genie_space'
          genie_space:
            name: 'agent-forge-checkin'
            space_id: '01f139de15a5156fb140cf83b40ed88f'
            permission: 'CAN_RUN'
        - name: 'agent_model_token'
          secret:
            scope: 'agent-forge'
            key: 'AGENT_MODEL_TOKEN'
            permission: 'READ'

targets:
  dev:
    mode: development

  default:
    mode: production
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/default
    resources:
      apps:
        agent_app:
          name: 'agent-vibe-app'
